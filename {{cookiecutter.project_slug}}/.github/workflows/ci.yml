name: CI

on:
  # We run CI on pushes to the main branch
  push:
    branches:
      - main
  # and on all pull requests to the main branch
  pull_request:
    branches:
      - main
  # as well as upon manual triggers through the 'Actions' tab of the Github UI
  workflow_dispatch:

jobs:
  build-and-test:
    name: Testing on ${{ "{{matrix.os}}" }}
    runs-on: ${{ "{{matrix.os}}" }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
    - uses: actions/checkout@v4
{% if cookiecutter.use_submodules == "Yes" %}
      with:
        submodules: 'recursive'
{%- endif %}
{% if cookiecutter.doxygen == "Yes" %}
    - name: Install Doxygen
      uses: ssciwr/doxygen-install@v1
{% endif %}
    - name: Make build directory
      run: cmake -E make_directory ${{ "{{ github.workspace }}" }}/build

    - name: Configure cmake
      shell: bash
      working-directory: ${{ "{{ github.workspace }}" }}/build
      run: cmake $GITHUB_WORKSPACE -DCMAKE_BUILD_TYPE=Debug -D{{ cookiecutter.project_slug }}_BUILD_DOCS=OFF -D{{ cookiecutter.project_slug }}_BUILD_PYTHON=OFF

    - name: Build
      shell: bash
      working-directory: ${{ "{{ github.workspace }}" }}/build
      run: cmake --build .

    - name: Run tests
      shell: bash
      working-directory: ${{ "{{ github.workspace }}" }}/build
      run: ctest
{%- if cookiecutter.python_bindings == "Yes" %}
  python-testing:
    name: Python package testing on ${{ "{{matrix.os}}" }}
    runs-on: ${{ "{{matrix.os}}" }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
    - uses: actions/checkout@v4
{% if cookiecutter.use_submodules == "Yes" %}
      with:
        submodules: 'recursive'
{%- endif %}

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.14"
{% if cookiecutter.doxygen == "Yes" %}
    - name: Install Doxygen
      uses: ssciwr/doxygen-install@v1
{% endif %}
    - name: Run Python tests
      shell: bash
      run: |
        python -m pip install .
        python -m pip install -r requirements-dev.txt
        pytest
{%- endif %}

{% if cookiecutter.codecovio == "Yes" %}
  coverage-test:
    name: Coverage Testing
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
{% if cookiecutter.use_submodules == "Yes" %}
      with:
        submodules: 'recursive'
{%- endif %}

    - name: Install LCov
      run: |
        sudo apt-get install -y lcov
{% if cookiecutter.doxygen == "Yes" %}
    - name: Install Doxygen
      uses: ssciwr/doxygen-install@v1
{% endif %}
{% if cookiecutter.python_bindings == "Yes" %}
    - name: Install Python package editable
      run: |
        python -m pip install scikit_build_core pybind11[global]
        python -m pip install --no-build-isolation --config-settings=build-dir="${{ "{{ github.workspace }}" }}/build" --config-settings=cmake.define.CMAKE_CXX_FLAGS="--coverage" --config-settings=cmake.define.BUILD_TESTING="ON" -v -e .
        python -m pip install -r requirements-dev.txt
    
    - name: Run Python tests
      run: |
        python -m pytest --cov --cov-report=xml
{% else %}
    - name: Create cmake build directory
      run: cmake -E make_directory ${{ "{{ github.workspace }}" }}/build

    - name: Configure cmake
      shell: bash
      working-directory: ${{ "{{ github.workspace }}" }}/build
      run: |
        cmake $GITHUB_WORKSPACE -DCMAKE_CXX_FLAGS="--coverage" -D{{ cookiecutter.project_slug }}_BUILD_DOCS=OFF

    - name: Build
      shell: bash
      working-directory: ${{ "{{ github.workspace }}" }}/build
      run: cmake --build .
{% endif %}

    - name: Run tests
      shell: bash
      working-directory: ${{ "{{ github.workspace }}" }}/build
      run: ctest

    - name: Collect coverage report
      shell: bash
      working-directory: ${{ "{{ github.workspace }}" }}
      run: |
        lcov --directory ./build{% if cookiecutter.header_only == "No" %}/src{% endif %} --capture --output-file coverage.info --ignore-errors mismatch,unused --exclude '*/catch2/*'

    - name: Upload C++ coverage to Codecov
      uses: codecov/codecov-action@v5
      with:
        fail_ci_if_error: true
        files: ${{ "{{github.workspace}}" }}/coverage.info{% if cookiecutter.python_bindings == "Yes" %},coverage.xml{% endif %}
{% endif %}
