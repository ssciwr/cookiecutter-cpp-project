name: Build Wheels + PyPI deploy

on:
  workflow_dispatch:
    inputs:
      publish_target:
        description: "Choose whether to build only, publish on TestPyPI, or publish on PyPI"
        required: true
        default: dry-run
        type: choice
        options:
          - dry-run
          - testpypi
  push:
    tags:
      - "v*"

jobs:
  build-wheels:
    name: Build wheels on {% raw %}${{ matrix.os }}{% endraw %}
    runs-on: {% raw %}${{ matrix.os }}{% endraw %}

    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          submodules: 'recursive'

      - name: Set up Python 3.14
        uses: actions/setup-python@v6
        with:
          python-version: "3.14"

      - name: Verify release tag matches package version
        if: {% raw %}${{ github.event_name == 'push' }}{% endraw %}
        shell: python
        run: |
          import os
          import pathlib
          import tomllib

          pyproject = pathlib.Path("pyproject.toml")
          version = tomllib.loads(pyproject.read_text())["project"]["version"]
          ref = os.environ["GITHUB_REF"]
          expected_ref = f"refs/tags/v{version}"

          if ref != expected_ref:
              raise SystemExit(
                  "Publishing requires running this workflow from the "
                  f"tag {expected_ref}, but GitHub provided {ref!r}."
              )

          print(f"Publishing from {ref}, matching project version {version}.")

      - name: Build wheels
        uses: pypa/cibuildwheel@v{{ cookiecutter._cibuildwheel_version }}

      - uses: actions/upload-artifact@v7
        with:
          name: wheels-{% raw %}${{ matrix.os }}{% endraw %}
          path: ./wheelhouse/*.whl
          if-no-files-found: error

  build-sdist:
    name: Build source distribution
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6
        with:
          submodules: 'recursive'

      - name: Build SDist
        run: pipx run build --sdist

      - uses: actions/upload-artifact@v7
        with:
          name: sdist
          path: dist/*.tar.gz
          if-no-files-found: error

  upload-testpypi:
    name: Publish on TestPyPI
    if: {% raw %}${{ github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && inputs.publish_target == 'testpypi') }}{% endraw %}
    needs: [build-wheels, build-sdist]
    runs-on: ubuntu-latest
    permissions:
      id-token: write

    steps:
      - name: Download sdist
        uses: actions/download-artifact@v8
        with:
          name: sdist
          merge-multiple: true
          path: dist

      - name: Download wheels
        uses: actions/download-artifact@v8
        with:
          pattern: wheels-*
          merge-multiple: true
          path: dist

      - name: Publish distributions to TestPyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://test.pypi.org/legacy/

  upload-pypi:
    name: Publish on PyPI
    if: {% raw %}${{ github.event_name == 'push' }}{% endraw %}
    needs: [build-wheels, build-sdist, upload-testpypi]
    runs-on: ubuntu-latest
    permissions:
      id-token: write

    steps:
      - name: Download sdist
        uses: actions/download-artifact@v8
        with:
          name: sdist
          merge-multiple: true
          path: dist

      - name: Download wheels
        uses: actions/download-artifact@v8
        with:
          pattern: wheels-*
          merge-multiple: true
          path: dist

      - uses: pypa/gh-action-pypi-publish@release/v1
