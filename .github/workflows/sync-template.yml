name: Sync template repository

on:
  push:
    branches:
      - sync-project-template
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout the cookiecutter repository
      uses: actions/checkout@v5
      with:
        path: cookiecutter-repository

    - name: Install cookiecutter and dependencies
      run: pip install cookiecutter

    - name: Set up git identity
      run: |
        git config --global user.name "ssc-sync-bot"
        git config --global user.email "<bot_username>@users.noreply.github.com"
  
    - name: Bake template using config
      run: |
        cookiecutter \
          --no-input \
          --config-file cookiecutter-repository/.github/cpp-project-template.yml \
          cookiecutter-repository/

    - name: Checkout target repository
      uses: actions/checkout@v5
      with:
        repository: ssciwr/cpp-project-template
        ref: sync-test
        path: target-repository
        token: ${{ secrets.TEMPLATE_SYNC_TOKEN }}

    - name: Sync generated files
      run: |
        rsync -av --delete \
          --exclude '.git/' \
          your-project/ target-repository/

    - name: Commit changes
      working-directory: target-repository
      run: |
        git add .
        git commit -m "Sync from ssciwr/cookiecutter-cpp-project" || echo "No changes"

    - name: Create pull request
      uses: peter-evans/create-pull-request@v7
      with:
        token: ${{ secrets.TEMPLATE_SYNC_TOKEN }}
        commit-message: "Sync from cookiecutter"
        branch: auto-sync/update-from-cookiecutter
        title: "Automated sync from cookiecutter"
        body: "This PR propagates changes from https://github.com/ssciwr/cookiecutter-cpp-project."
        base: sync-test
        path: target-repository
